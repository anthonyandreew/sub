# Karing / Clash-compatible profile
# Mode: Global Direct
# Default route: DIRECT
# Selected services and subscribed rule sets: PROXY
#
# Notes:
# 1. Karing may manage DNS separately in Settings -> DNS.
# 2. The proxy subscription is loaded through proxy-providers.
# 3. Rule order matters: specific rules are evaluated before broad rule sets.

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: 0.0.0.0:1053
  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://8.8.4.4/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "localhost.*"
    - "time.*.com"
    - "ntp.*.com"
    - "+.pool.ntp.org"

proxy-providers:
  My-subscription:
    type: http
    url: "https://raw.githubusercontent.com/anthonyandreew/sub/refs/heads/main/my_servers_list.txt"
    path: ./providers/my-subscription.yaml
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 600
      timeout: 5000
      lazy: true

proxy-groups:
  - name: PROXY
    type: url-test
    use:
      - My-subscription
    url: "http://www.gstatic.com/generate_204"
    interval: 600
    timeout: 5000
    tolerance: 80
    lazy: true

  - name: YouTube
    type: url-test
    use:
      - My-subscription
    filter: "(?i)vless"
    url: "https://www.youtube.com/generate_204"
    interval: 600
    timeout: 5000
    tolerance: 80
    lazy: true

