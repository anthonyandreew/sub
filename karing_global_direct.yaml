rules:
  # Local/private traffic must never enter the proxy.
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - DOMAIN-SUFFIX,local,DIRECT

  # Manual rules from the Loon profile.
  - DOMAIN-SUFFIX,idownloadblog.com,PROXY
  - DOMAIN-KEYWORD,slack,PROXY
  - DOMAIN-SUFFIX,airbnbcdn.com,PROXY
  - DOMAIN-KEYWORD,pakt,PROXY
  - DOMAIN-SUFFIX,ip-api.com,PROXY
  - DOMAIN,2ip.io,PROXY
  - DOMAIN-KEYWORD,airbnb,PROXY

  # More specific service rules before broad/global lists.
  - RULE-SET,youtube,YouTube
  - RULE-SET,telegram,PROXY
  - RULE-SET,openai,PROXY
  - RULE-SET,claude,PROXY
  - RULE-SET,gemini,PROXY
  - RULE-SET,google,PROXY
  - RULE-SET,instagram,PROXY
  - RULE-SET,whatsapp,PROXY
  - RULE-SET,facebook,PROXY
  - RULE-SET,linkedin,PROXY
  - RULE-SET,twitter,PROXY
  - RULE-SET,notion,PROXY
  - RULE-SET,appstore,PROXY
  - RULE-SET,apple,PROXY
  - RULE-SET,speedtest,PROXY
  - RULE-SET,cloudflare,PROXY

  # User-maintained aggregate lists.
  - RULE-SET,selected-blocked-domains,PROXY
  - RULE-SET,selected-blocked-ip,PROXY,no-resolve

  # Broad fallback proxy list from Blackmatrix7.
  - RULE-SET,global-proxy,PROXY

  # Global-direct behavior.
  - MATCH,DIRECT